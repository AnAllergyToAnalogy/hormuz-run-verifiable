[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
hormuz_run = "HhbTBeyzaGyWYWjb8bAJqhjxVQbYUBSCU9xYLZMWjAis"

[registry]
